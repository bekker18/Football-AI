# Usage:
#   docker compose build
#   docker compose run --rm download                      # one-time: models + sample clip
#   docker compose run --rm extract                       # runs on the sample clip
#   docker compose run --rm extract --source /data/raw/mygame.mp4 --ball --save-video /data/gamestate/annot.mp4
#
# Everything lives under one bind mount (./data): input footage in /data/raw,
# checkpoints in /data/models, results in /data/gamestate.

services:
  download:
    build: .
    # Docker keeps everything flat under the /data mount; override the script's
    # default (models/ + data/raw/) so checkpoints and footage land there.
    environment:
      - MODELS_DIR=/data/models
      - RAW_DIR=/data/raw
    entrypoint: ["bash", "download_assets.sh"]
    volumes:
      - ./data:/data

  extract:
    build: .
    volumes:
      - ./data:/data
    # Default command (override anything after `extract` on the CLI).
    command: ["--source", "/data/raw/2e57b9_0.mp4", "--out-dir", "/data/gamestate", "--device", "cpu"]

  # GPU variant — requires NVIDIA Container Toolkit on the host (more than "just
  # Docker"). Build with the cu121 torch index (see README) before using this.
  extract-gpu:
    build: .
    volumes:
      - ./data:/data
    command: ["--source", "/data/raw/2e57b9_0.mp4", "--out-dir", "/data/gamestate", "--device", "cuda"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
